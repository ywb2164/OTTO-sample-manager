name: Publish Windows release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify tag version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ("v$version" -ne "${{ github.ref_name }}") { throw "Tag must equal v$version" }
      - name: Test
        run: npm test
      - name: Type check main
        run: npx tsc --noEmit -p tsconfig.node.json
      - name: Type check renderer
        run: npx tsc --noEmit -p tsconfig.web.json
      - name: Publish Windows artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Future signing: configure WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD in repository secrets.
        run: npm run pack -- --publish always
