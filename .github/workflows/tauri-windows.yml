name: Tauri Windows

on:
  pull_request:
  push:
    branches:
      - main
      - codex/tauri-windows-migration
    tags:
      - 'v*'

jobs:
  verify-windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Install JavaScript dependencies
        run: npm ci

      - name: TypeScript
        run: npm run check:types

      - name: React and Electron tests
        run: npm test

      - name: Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build unsigned-check NSIS package
        run: npm run tauri:build -- --ci

      - name: Enforce release artifact contract
        run: npm run tauri:verify:release

      - name: Enforce installer size target
        shell: pwsh
        run: |
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis -Filter '*.exe' | Select-Object -First 1
          if (-not $installer) { throw 'NSIS installer was not generated' }
          if ($installer.Length -gt 30MB) { throw "Installer is $([math]::Round($installer.Length / 1MB, 2)) MiB; target is 30 MiB" }
          "NSIS size: $([math]::Round($installer.Length / 1MB, 2)) MiB"

      - uses: actions/upload-artifact@v4
        with:
          name: otto-tauri-nsis-${{ github.sha }}
          path: src-tauri/target/release/bundle/nsis/*.exe

  signed-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify-windows
    runs-on: windows-2025
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: OTTO Sample Manager ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: --config src-tauri/tauri.release.conf.json --ci
