appId: com.electron.app
productName: 采样管理器
copyright: Copyright © 2024
directories:
  buildResources: resources
  output: ../sample-manager-release
asar: true
files:
  - out/**/*
  - package.json
  - '!**/.vscode/*'
  - '!**/.idea/*'
  - '!**/.git/*'
  - '!**/.claude/*'
  - '!src/*'
  - '!build/*'
  - '!resources/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,package-lock.json,pnpm-lock.yaml,yarn.lock}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!**/*.{map,md,markdown,mkdown}'
  - '!**/*.{d.ts,d.cts,d.mts,test-d.ts}'
  - '!**/{test,tests,__tests__,spec,specs,example,examples,demo,demos,docs,doc,benchmark,benchmarks}/**'
  - '!**/node_modules/**/{test,tests,__tests__,spec,specs,example,examples,demo,demos,docs,doc,benchmark,benchmarks}/**'
  - '!**/node_modules/**/.github/**'
  - '!**/node_modules/**/src/**'
  - '!**/node_modules/**/.runkit_example.js'
  - '!**/node_modules/**/dist-src/**'
extraResources:
  - from: resources/drag-icon.png
    to: resources/drag-icon.png
win:
  executableName: sample-manager
  icon: icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: icon.ico
  uninstallerIcon: icon.ico
  installerHeaderIcon: icon.ico
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
